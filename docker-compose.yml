services:
  honeypot:
    build: .
    container_name: honeypot_nexus
    env_file:
      - path: .env
        required: false
    environment:
      HONEYPOT_DB_PATH: ${HONEYPOT_DB_PATH:-/app/data/honeypot.db}
      HONEYPOT_BIND_HOST: ${HONEYPOT_BIND_HOST:-0.0.0.0}
      HONEYPOT_DASHBOARD_PORT: ${HONEYPOT_DASHBOARD_PORT:-5050}
    ports:
      - "2222:2222"       # SSH sensor
      - "2121:2121"       # FTP sensor
      - "8080:8080"       # HTTP sensor / trap paths
      - "2323:2323"       # Telnet sensor
      - "4444:4444"       # TCP/NC sensor
      - "127.0.0.1:5050:5050" # Dashboard/API: private by default; put TLS/VPN/reverse proxy in front
    volumes:
      - honeypot_data:/app/data
      - honeypot_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Optional local automation. Start with: docker compose --profile automation up -d n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: honeypot_n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?set_N8N_ENCRYPTION_KEY_in_.env}
      - WEBHOOK_URL=${N8N_WEBHOOK_PUBLIC_URL:-http://localhost:5678/}
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    profiles: ["automation"]

  # Optional analyst tools. They are private/local by default.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: honeypot_kibana
    ports:
      - "127.0.0.1:5601:5601"
    restart: unless-stopped
    profiles: ["ecosystem"]

  cyberchef:
    image: ghcr.io/gchq/cyberchef:latest
    container_name: honeypot_cyberchef
    ports:
      - "127.0.0.1:8089:80"
    restart: unless-stopped
    profiles: ["ecosystem"]

  spiderfoot:
    image: spiderfoot/spiderfoot:latest
    container_name: honeypot_spiderfoot
    ports:
      - "127.0.0.1:5001:5001"
    restart: unless-stopped
    profiles: ["ecosystem"]

volumes:
  honeypot_data:
  honeypot_logs:
  n8n_data:
