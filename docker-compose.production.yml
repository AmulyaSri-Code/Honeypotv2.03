services:
  honeypot:
    build: .
    container_name: honeypot_nexus_prod
    env_file:
      - .env
    environment:
      # Bind inside the container to all interfaces; host publish below keeps dashboard private on loopback.
      HONEYPOT_BIND_HOST: 0.0.0.0
      HONEYPOT_SENSOR_BIND_HOST: 0.0.0.0
      HONEYPOT_DASHBOARD_PORT: 5050
      HONEYPOT_ALLOW_DEFAULT_ADMIN: "false"
    ports:
      # Public decoy services. Restrict with cloud firewall/security groups where possible.
      - "2222:2222"
      - "2121:2121"
      - "8080:8080"
      - "2323:2323"
      - "4444:4444"
      # Management dashboard. For internet deployments, prefer binding to 127.0.0.1 and proxying through TLS/VPN.
      - "127.0.0.1:5050:5050"
    volumes:
      - honeypot_data:/app/data
      - honeypot_logs:/app/logs
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 512m
    cpus: 1.0
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    read_only: false
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5050/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  honeypot_data:
  honeypot_logs:
